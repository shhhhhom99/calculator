    <script>
        // Micro-interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'translateY(1px)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'translateY(0)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'translateY(0)';
            });
        });

        // App State
        const state = {
            currentInput: '0',
            historyExpr: '',
            prevValue: null,
            operator: null,
            isNewInput: false,
            angleMode: 'RAD',
            logs: []
        };

        const readout = document.getElementById('calc-readout');
        const historyDisplay = document.getElementById('calc-history');
        const radToggle = document.getElementById('toggle-rad');
        const degToggle = document.getElementById('toggle-deg');
        const logsContainer = document.getElementById('logs-container');

        // Helpers
        function formatNumber(num) {
            if (isNaN(num) || !isFinite(num)) {
                return 'Error';
            }
            if (num === 0) return '0';
            const absVal = Math.abs(num);
            if (absVal > 1e12 || (absVal < 1e-7 && absVal > 0)) {
                return num.toExponential(6);
            }
            return parseFloat(num.toFixed(10)).toString();
        }

        function updateDisplay() {
            readout.innerText = state.currentInput;
            historyDisplay.innerText = state.historyExpr;
        }

        // Calculation core logic
        function performCalc(v1, v2, op) {
            switch (op) {
                case '+': return v1 + v2;
                case '-': return v1 - v2;
                case '*': return v1 * v2;
                case '/': return v2 !== 0 ? v1 / v2 : NaN;
                default: return v2;
            }
        }

        function opSymbol(op) {
            switch (op) {
                case '+': return '+';
                case '-': return '−';
                case '*': return '×';
                case '/': return '÷';
                default: return '';
            }
        }

        // Action Handlers
        function handleDigit(digit) {
            if (state.isNewInput) {
                state.currentInput = digit;
                state.isNewInput = false;
            } else {
                state.currentInput = state.currentInput === '0' ? digit : state.currentInput + digit;
            }
            updateDisplay();
        }

        function handleDecimal() {
            if (state.isNewInput) {
                state.currentInput = '0.';
                state.isNewInput = false;
            } else if (!state.currentInput.includes('.')) {
                state.currentInput += '.';
            }
            updateDisplay();
        }

        function handleOperator(nextOp) {
            const val = parseFloat(state.currentInput);
            if (isNaN(val)) return;

            if (state.operator && state.isNewInput) {
                state.operator = nextOp;
                state.historyExpr = `${formatNumber(state.prevValue)} ${opSymbol(nextOp)}`;
                updateDisplay();
                return;
            }

            if (state.prevValue === null) {
                state.prevValue = val;
            } else if (state.operator) {
                const res = performCalc(state.prevValue, val, state.operator);
                state.currentInput = formatNumber(res);
                state.prevValue = res;
            }

            state.operator = nextOp;
            state.isNewInput = true;
            state.historyExpr = `${formatNumber(state.prevValue)} ${opSymbol(nextOp)}`;
            updateDisplay();
        }

        function handleEquals() {
            if (state.operator === null || state.prevValue === null || state.isNewInput) return;

            const val = parseFloat(state.currentInput);
            if (isNaN(val)) return;

            const fullExpression = `${formatNumber(state.prevValue)} ${opSymbol(state.operator)} ${formatNumber(val)}`;
            const result = performCalc(state.prevValue, val, state.operator);
            const formattedResult = formatNumber(result);

            if (formattedResult === 'Error') {
                state.currentInput = 'Error';
                state.historyExpr = 'Division by Zero';
            } else {
                state.historyExpr = `${fullExpression} =`;
                state.currentInput = formattedResult;
                addLogEntry(fullExpression, formattedResult);
            }

            state.prevValue = null;
            state.operator = null;
            state.isNewInput = true;
            updateDisplay();
        }

        function handleAC() {
            state.currentInput = '0';
            state.historyExpr = '';
            state.prevValue = null;
            state.operator = null;
            state.isNewInput = false;
            updateDisplay();
        }

        function handleToggleSign() {
            const val = parseFloat(state.currentInput);
            if (!isNaN(val) && val !== 0) {
                state.currentInput = formatNumber(val * -1);
                updateDisplay();
            }
        }

        function handlePercent() {
            const val = parseFloat(state.currentInput);
            if (!isNaN(val)) {
                state.currentInput = formatNumber(val / 100);
                updateDisplay();
            }
        }

        function handleScientific(func) {
            const val = parseFloat(state.currentInput);
            if (isNaN(val)) return;

            let result = NaN;
            let exprText = '';

            const degToRad = (deg) => deg * Math.PI / 180;

            switch (func) {
                case 'sin':
                    result = Math.sin(state.angleMode === 'DEG' ? degToRad(val) : val);
                    exprText = `sin(${val})`;
                    break;
                case 'cos':
                    result = Math.cos(state.angleMode === 'DEG' ? degToRad(val) : val);
                    exprText = `cos(${val})`;
                    break;
                case 'log':
                    result = val > 0 ? Math.log10(val) : NaN;
                    exprText = `log(${val})`;
                    break;
                case '√x':
                    result = val >= 0 ? Math.sqrt(val) : NaN;
                    exprText = `√(${val})`;
                    break;
            }

            const formatted = formatNumber(result);
            if (formatted === 'Error') {
                state.currentInput = 'Error';
                state.historyExpr = 'Domain Error';
            } else {
                state.historyExpr = `${exprText} =`;
                state.currentInput = formatted;
                addLogEntry(exprText, formatted);
            }
            state.isNewInput = true;
            updateDisplay();
        }

        // Mode Toggling
        function setAngleMode(mode) {
            state.angleMode = mode;
            if (mode === 'RAD') {
                radToggle.className = 'font-label-sm text-label-sm text-on-surface font-bold bg-surface px-2 border border-outline cursor-pointer select-none';
                degToggle.className = 'font-label-sm text-label-sm text-on-surface-variant opacity-50 cursor-pointer select-none';
            } else {
                degToggle.className = 'font-label-sm text-label-sm text-on-surface font-bold bg-surface px-2 border border-outline cursor-pointer select-none';
                radToggle.className = 'font-label-sm text-label-sm text-on-surface-variant opacity-50 cursor-pointer select-none';
            }
        }

        radToggle.addEventListener('click', () => setAngleMode('RAD'));
        degToggle.addEventListener('click', () => setAngleMode('DEG'));

        // Calculation Log history
        function addLogEntry(expr, res) {
            const log = {
                id: Date.now(),
                label: `Calc #${state.logs.length + 1}`,
                expression: expr,
                result: res
            };
            state.logs.unshift(log);
            saveLogs();
            renderLogs();
        }

        function renderLogs() {
            if (state.logs.length === 0) {
                logsContainer.innerHTML = `<div class="text-center font-label-sm text-label-sm text-on-surface-variant opacity-50 py-4 select-none">No logs yet</div>`;
                return;
            }
            logsContainer.innerHTML = state.logs.slice(0, 5).map(log => `
                <div class="border-b border-outline-variant pb-2 group">
                    <div class="flex justify-between font-label-sm text-label-sm text-on-surface-variant">
                        <span class="cursor-pointer hover:text-primary select-none font-bold" onclick="renameLog(${log.id})">${log.label}</span>
                        <span onclick="renameLog(${log.id})" class="opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer material-symbols-outlined text-[14px] hover:text-primary select-none">edit_note</span>
                    </div>
                    <div class="font-label-md text-label-md text-on-surface cursor-pointer hover:text-primary select-none" onclick="loadLogResult('${log.result}')">${log.expression} = ${log.result}</div>
                </div>
            `).join('');
        }

        window.renameLog = function(id) {
            const log = state.logs.find(l => l.id === id);
            if (!log) return;
            const newLabel = prompt("Rename note for this calculation:", log.label);
            if (newLabel !== null && newLabel.trim() !== '') {
                log.label = newLabel.trim();
                saveLogs();
                renderLogs();
                if (!document.getElementById('full-logs-modal').classList.contains('hidden')) {
                    renderModalLogsList();
                }
            }
        };

        window.loadLogResult = function(res) {
            state.currentInput = res;
            state.isNewInput = true;
            updateDisplay();
        };

        function saveLogs() {
            try {
                localStorage.setItem('pe8000_logs', JSON.stringify(state.logs));
            } catch(e) {}
        }

        function loadLogs() {
            try {
                const saved = localStorage.getItem('pe8000_logs');
                if (saved) {
                    state.logs = JSON.parse(saved);
                } else {
                    state.logs = [];
                }
            } catch(e) {
                state.logs = [];
            }
            renderLogs();
        }

        // Full Logs Modal Handlers
        const fullLogsModal = document.getElementById('full-logs-modal');
        const modalLogsList = document.getElementById('modal-logs-list');
        const searchInput = document.getElementById('modal-log-search');

        document.getElementById('btn-view-full-logs').addEventListener('click', openModal);
        document.getElementById('close-logs-modal').addEventListener('click', closeModal);
        document.getElementById('btn-close-modal-done').addEventListener('click', closeModal);

        function openModal() {
            fullLogsModal.classList.remove('hidden');
            renderModalLogsList();
        }

        function closeModal() {
            fullLogsModal.classList.add('hidden');
        }

        function renderModalLogsList() {
            const query = searchInput.value.toLowerCase();
            const filtered = state.logs.filter(l => 
                l.label.toLowerCase().includes(query) || 
                l.expression.toLowerCase().includes(query) || 
                l.result.toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                modalLogsList.innerHTML = `<div class="text-center font-label-sm text-label-sm text-on-surface-variant opacity-50 py-8 select-none">No calculations found</div>`;
                return;
            }

            modalLogsList.innerHTML = filtered.map(log => `
                <div class="p-3 border border-outline rounded bg-surface-container flex justify-between items-center hover:border-primary transition-all">
                    <div>
                        <div class="font-bold text-xs text-primary font-label-sm select-none">${log.label}</div>
                        <div class="font-label-md text-sm text-on-surface mt-1">${log.expression} = <span class="font-bold">${log.result}</span></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="renameLog(${log.id})" class="p-1 border border-outline rounded text-secondary hover:text-primary hover:border-primary transition-colors"><span class="material-symbols-outlined text-[16px] flex">edit_note</span></button>
                        <button onclick="loadLogResult('${log.result}'); document.getElementById('full-logs-modal').classList.add('hidden');" class="px-2.5 py-1 bg-primary text-on-primary text-xs font-label-sm rounded hover:bg-on-primary-fixed-variant transition-colors select-none">Load</button>
                    </div>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', renderModalLogsList);

        document.getElementById('btn-clear-all-logs').addEventListener('click', () => {
            if (state.logs.length === 0) return;
            if (confirm("Clear all calculation history logs?")) {
                state.logs = [];
                saveLogs();
                renderLogs();
                renderModalLogsList();
            }
        });

        document.getElementById('btn-export-csv').addEventListener('click', () => {
            if (state.logs.length === 0) return;
            let csv = "ID,Label,Expression,Result\n";
            state.logs.forEach(l => {
                csv += `"${l.id}","${l.label}","${l.expression}","${l.result}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `industrial_calc_logs_${Date.now()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Mobile Nav handlers
        document.getElementById('mobile-tab-calc').addEventListener('click', () => {
            closeModal();
        });
        document.getElementById('mobile-tab-logs').addEventListener('click', () => {
            openModal();
        });
        document.getElementById('mobile-tab-notes').addEventListener('click', () => {
            openModal();
        });

        // Event delegation for grid clicks
        document.getElementById('calc-buttons-grid').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const text = btn.innerText.trim();

            if (text >= '0' && text <= '9') {
                handleDigit(text);
            } else if (text === '.') {
                handleDecimal();
            } else if (text === 'AC') {
                handleAC();
            } else if (text === '±') {
                handleToggleSign();
            } else if (text === '%') {
                handlePercent();
            } else if (text === '+') {
                handleOperator('+');
            } else if (text === '−') {
                handleOperator('-');
            } else if (text === '×') {
                handleOperator('*');
            } else if (text === '÷') {
                handleOperator('/');
            } else if (text === '=') {
                handleEquals();
            }
        });

        document.getElementById('scientific-buttons-grid').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const text = btn.innerText.trim();
            handleScientific(text);
        });

        // Keyboard Support
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;

            const key = e.key;
            let targetButton = null;

            // Find matching button text
            let textToFind = '';
            if (key >= '0' && key <= '9') textToFind = key;
            else if (key === '.') textToFind = '.';
            else if (key === '+') textToFind = '+';
            else if (key === '-') textToFind = '−';
            else if (key === '*') textToFind = '×';
            else if (key === '/') textToFind = '÷';
            else if (key === '=' || key === 'Enter') textToFind = '=';
            else if (key === 'Escape') textToFind = 'AC';
            else if (key === '%') textToFind = '%';

            if (textToFind) {
                const buttons = Array.from(document.querySelectorAll('#calc-buttons-grid button'));
                targetButton = buttons.find(b => b.innerText.trim() === textToFind);
            }

            if (targetButton) {
                targetButton.style.transform = 'translateY(1px)';
                setTimeout(() => {
                    targetButton.style.transform = 'translateY(0)';
                }, 100);
                targetButton.click();
                if (key === 'Enter') e.preventDefault();
            } else {
                // scientific keys
                if (key === 's') {
                    const btn = Array.from(document.querySelectorAll('#scientific-buttons-grid button')).find(b => b.innerText.trim() === 'sin');
                    if (btn) btn.click();
                } else if (key === 'c') {
                    const btn = Array.from(document.querySelectorAll('#scientific-buttons-grid button')).find(b => b.innerText.trim() === 'cos');
                    if (btn) btn.click();
                } else if (key === 'l') {
                    const btn = Array.from(document.querySelectorAll('#scientific-buttons-grid button')).find(b => b.innerText.trim() === 'log');
                    if (btn) btn.click();
                } else if (key === 'r') {
                    const btn = Array.from(document.querySelectorAll('#scientific-buttons-grid button')).find(b => b.innerText.trim() === '√x');
                    if (btn) btn.click();
                }
            }
        });

        // Init
        window.addEventListener('DOMContentLoaded', () => {
            loadLogs();
            updateDisplay();
        });
    </script>
</body></html>
